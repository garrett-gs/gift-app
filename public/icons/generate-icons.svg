<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#171717"/>
  <g transform="translate(256,256) scale(0.55)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gift box body -->
    <rect x="-160" y="-40" width="320" height="200" rx="12"/>
    <!-- Gift box lid -->
    <rect x="-180" y="-100" width="360" height="70" rx="12"/>
    <!-- Vertical ribbon -->
    <line x1="0" y1="-100" x2="0" y2="160"/>
    <!-- Horizontal ribbon -->
    <line x1="-160" y1="30" x2="160" y2="30"/>
    <!-- Bow left -->
    <path d="M0,-100 C-60,-160 -120,-130 -80,-100"/>
    <!-- Bow right -->
    <path d="M0,-100 C60,-160 120,-130 80,-100"/>
  </g>
</svg>
